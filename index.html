<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vortex AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <main class="shell">
    <section class="panel">
      <header class="topbar">
        <div>
          <p class="kicker">AI Assistant</p>
          <h1>Vortex AI</h1>
        </div>
        <div class="status">Online</div>
      </header>

      <div id="messages" class="messages" aria-live="polite"></div>

      <div class="chips">
        <button data-prompt="weather in New Delhi">Weather</button>
        <button data-prompt="news about technology">News</button>
        <button data-prompt="How to fix Python list index out of range?">Programming</button>
        <button data-prompt="give me health tips">Health Tips</button>
      </div>

      <form id="chat-form" class="composer">
        <input id="message-input" type="text" placeholder="Ask anything..." autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>

</html>
